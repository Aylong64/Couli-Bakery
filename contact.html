<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>COULi Bakery — Contact</title>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><img src="logo.png" alt="COULi Bakery Logo"></a>
        <nav class="navigate">
            <ul>
                <li><a href="index.html"><b>Home</b></a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
        <div id="menu"><i class="fas fa-bars"></i></div>
    </header>
    <footer class="contact page-section" id="contact">
        <div class="cake-contact">
            <div class="cake-contact-row">
                <div class="cake-contact-col">
                    <img src="hg3.png" alt="COULi Bakery" class="images">
                </div>
                <div class="cake-contact-col">
                    <h1>Contact Us</h1>
                    <div class="social">
                        <a href="#"><i class="fab fa-whatsapp"></i></a>
                        <a href="https://www.instagram.com/coulibakery/" target="_blank" rel="noopener">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a href="https://twitter.com/coulibakery" target="_blank" rel="noopener">
                            <i class="fab fa-twitter"></i>
                        </a>
                    </div>
                    <p>coulibakery@gmail.com<br>+234 902 460 5689</p>
                    <p>Please give your honest reviews — it helps us serve you better:</p>

                    <form id="formdetails" method="post">
                        <input type="text" name="name" id="name" placeholder="Your Name" required>
                        <input type="email" name="email" id="email" placeholder="Your Email" required>
                        <input type="tel" name="mobile" id="mobile" placeholder="Your Mobile No.">
                        <textarea rows="6" name="msg" placeholder="Your Review"></textarea>
                        <button class="btn" type="submit">Submit <i class="fas fa-angle-right"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </footer>

    <div class="page-footer">
        <p>© 2024 COULi Bakery · Lagos, Nigeria</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="nav.js"></script>
</body>
</html>
